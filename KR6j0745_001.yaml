body:
  text: 大興善寺翻經院灌頂阿闍梨述云云我今披見秘藏要文有成就夢想法為末世眾生故說是次第儀則於淨室中作一方壇隨意大小其壇中辦備供物謂香花油燈飲食菓子蘇蜜歡喜團等如是種種不可具說隨時取新者用之次說勸請法曰我今勸請佛眼尊文殊玅幢諸眷屬北斗七曜九執等二十八宿十二宮十二天王二六神諸龍藥叉羅剎等山王河王大樹王所有十方大善神不越勸請淨心力降臨影向受玅具護持某甲除不祥成就好夢與諸願次說大鈎召呪曰內縛右風招之歸命惡薩縛怛羅鉢羅底賀帝怛他誐黨矩奢地淅哩也鉢哩布羅迦耶娑婆賀引若有眾生誦此呪時一切聖眾天龍鬼神皆隨喜來詣復次說成就好夢法禮北方而作是念言我今歸依佛法僧文殊玅幢北斗星十二天王諸星宿知見吉夢成所願復次說真言曰唵引阿引入惡聲味引羅吽引佉左𠸪若有眾生得見好夢不得成就者由此教法念文殊師利菩薩及妙幢菩薩等若臥時誦一百八遍常得好夢能知善惡之事若有人得吉夢欲成就者加持飲食七遍食者不久得成就唯除思夢忙想來夢也復次誰思除滅惡夢法禮北斗方而作是念言我今歸依佛法僧文殊玅幢北斗星十二天王諸星宿願除惡夢得善事復次說真言曰唵瑟置哩二合迦攞嚕跛吽欠薩嚩二合呵若有善男子善女人等得見惡夢不祥出現者以命木作人形書彼那麼加持七遍三日終竟彼人形置山野及大河邊不祥消滅心神安樂若有人常得吉夢如是不修行者不得久成就乃至消滅雖見惡夢如是修行者不應還成吉事又取白線作索呪二十一結繫身出入三度惡夢不應復次說供養真言曰金剛合掌二風寶形唵阿謨佉布惹麼柅跛納麼嚩曰𭭳怛他蘖多尾路枳帝三滿多鉢羅薩羅吽若有眾生誦此真言供養三寶時流出無量供養雲海供養一切聖眾復次說施食呪曰右手以空摩火甲三兩反餘三指直之又空風彈指作聲一誦一彈七返曩莫薩縛怛他蘖哆縛嚕枳帝唵三婆羅三婆羅吽若有人以此呪加持飲食施與一切天龍藥叉羅剎娑等山王海王河王大樹王一切諸鬼神等各各皆得摩伽陀國所用斗七七斛食皆悉飽滿次發遣頌曰唯願聖眾并諸眷屬加持某甲還歸大宮保延六年正月十八日書寫之移點了嘉祿元年六月三日奉隨日光房僧都御房於堀川壇所奉受了圓俊記之文永元年六月二十八日奉寫之繁承記同七月十一日奉從修月房僧都御房奉受云了繁承同十八日以或本見合加墨點了
